spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:4407}/${MYSQL_DATABASE:english_nova}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:english_nova}
    password: ${MYSQL_PASSWORD:english_nova}
  elasticsearch:
    uris: http://${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  port: ${SEARCH_SERVICE_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

english-nova:
  search:
    exchange: ${ENGLISH_NOVA_IMPORT_EXCHANGE:english-nova.import}
    index-queue: ${ENGLISH_NOVA_SEARCH_INDEX_QUEUE:english-nova.search.index.queue}
    routing-key: ${ENGLISH_NOVA_INDEXED_ROUTING_KEY:english.nova.wordbook.imported}

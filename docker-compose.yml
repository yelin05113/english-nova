services:
  mysql:
    image: mysql:8.4
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-english_nova}
      MYSQL_USER: ${MYSQL_USERNAME:-english_nova}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-english_nova}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u"${MYSQL_USERNAME:-english_nova}" -p"${MYSQL_PASSWORD:-english_nova}" --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v3.1.1
    env_file:
      - ./.env
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_CONSOLE_PORT:-8080}:8080"
      - "${NACOS_GRPC_PORT:-9848}:9848"
    restart: unless-stopped

  seeder:
    image: mysql:8.4
    env_file:
      - ./.env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      NACOS_BASE_URL: http://nacos:8848
      NACOS_USERNAME:
      NACOS_PASSWORD:
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    volumes:
      - ./docker/seeder:/seed/seeder:ro
      - ./docker/mysql:/seed/mysql:ro
      - ./docker/nacos:/seed/nacos:ro
    entrypoint:
      - sh
      - /seed/seeder/seed.sh
    restart: "no"

  redis:
    image: redis:7.4-alpine
    env_file:
      - ./.env
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
        fi;
        exec redis-server --appendonly yes;
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping;
          else
            redis-cli ping;
          fi
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.1-management
    env_file:
      - ./.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data:

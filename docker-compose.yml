services:
  frontend:
    build:
      context: ./FrontEnd-EnglishNova
      dockerfile: Dockerfile
    depends_on:
      gateway-service:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

  gateway-service:
    build:
      context: ./BackEnd-EnglishNova/distributed
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway-service
    env_file:
      - ./.env.docker
    environment:
      SERVER_PORT: 8080
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    depends_on:
      nacos:
        condition: service_started
      auth-service:
        condition: service_started
      system-service:
        condition: service_started
      study-service:
        condition: service_started
      search-service:
        condition: service_started
      import-service:
        condition: service_started
      quiz-service:
        condition: service_started
    ports:
      - "${GATEWAY_SERVICE_PORT:-8080}:8080"
    restart: unless-stopped

  auth-service:
    build:
      context: ./BackEnd-EnglishNova/distributed
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    env_file:
      - ./.env.docker
    environment:
      SERVER_PORT: 8085
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-72}
    depends_on:
      nacos:
        condition: service_started
      mysql-init:
        condition: service_completed_successfully
    ports:
      - "${AUTH_SERVICE_PORT:-8085}:8085"
    restart: unless-stopped

  system-service:
    build:
      context: ./BackEnd-EnglishNova/distributed
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: system-service
    env_file:
      - ./.env.docker
    environment:
      SERVER_PORT: 8081
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    depends_on:
      nacos:
        condition: service_started
      mysql-init:
        condition: service_completed_successfully
    ports:
      - "${SYSTEM_SERVICE_PORT:-8081}:8081"
    restart: unless-stopped

  study-service:
    build:
      context: ./BackEnd-EnglishNova/distributed
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: study-service
    env_file:
      - ./.env.docker
    environment:
      SERVER_PORT: 8082
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    depends_on:
      nacos:
        condition: service_started
      mysql-init:
        condition: service_completed_successfully
    ports:
      - "${STUDY_SERVICE_PORT:-8082}:8082"
    restart: unless-stopped

  search-service:
    build:
      context: ./BackEnd-EnglishNova/distributed
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: search-service
    env_file:
      - ./.env.docker
    environment:
      SERVER_PORT: 8083
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      RABBITMQ_HOST: rabbitmq
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    depends_on:
      nacos:
        condition: service_started
      mysql-init:
        condition: service_completed_successfully
    ports:
      - "${SEARCH_SERVICE_PORT:-8083}:8083"
    restart: unless-stopped

  import-service:
    build:
      context: ./BackEnd-EnglishNova/distributed
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: import-service
    env_file:
      - ./.env.docker
    environment:
      SERVER_PORT: 8084
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      RABBITMQ_HOST: rabbitmq
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    depends_on:
      nacos:
        condition: service_started
      mysql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "${IMPORT_SERVICE_PORT:-8084}:8084"
    restart: unless-stopped

  quiz-service:
    build:
      context: ./BackEnd-EnglishNova/distributed
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: quiz-service
    env_file:
      - ./.env.docker
    environment:
      SERVER_PORT: 8086
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    depends_on:
      nacos:
        condition: service_started
      mysql-init:
        condition: service_completed_successfully
    ports:
      - "${QUIZ_SERVICE_PORT:-8086}:8086"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    env_file:
      - ./.env.docker
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-english_nova}
      MYSQL_USER: ${MYSQL_USERNAME:-english_nova}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-english_nova}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u"${MYSQL_USERNAME:-english_nova}" -p"${MYSQL_PASSWORD:-english_nova}" --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v3.1.1
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
    restart: unless-stopped

  mysql-init:
    image: mysql:8.4
    env_file:
      - ./.env.docker
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./docker/mysql/init:/init:ro
    entrypoint:
      - sh
      - -c
      - |
        mysql -hmysql -u"$${MYSQL_USERNAME}" -p"$${MYSQL_PASSWORD}" "$${MYSQL_DATABASE}" < /init/001-schema.sql
        mysql -hmysql -u"$${MYSQL_USERNAME}" -p"$${MYSQL_PASSWORD}" "$${MYSQL_DATABASE}" < /init/002-seed.sql
    restart: "no"

  redis:
    image: redis:7.4-alpine
    env_file:
      - ./.env.docker
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
        fi;
        exec redis-server --appendonly yes;
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping;
          else
            redis-cli ping;
          fi
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.1-management
    env_file:
      - ./.env.docker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data:
